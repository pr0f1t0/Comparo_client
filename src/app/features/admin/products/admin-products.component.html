<h2 class="page-title">Product Management</h2>

<div *ngIf="loading()" class="loading-state">
  <mat-spinner diameter="36" />
</div>

<div *ngIf="!loading()" class="table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Base Price</th>
        <th>Attributes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products()">
        <td>
          <img
            class="product-thumb"
            [src]="product.images.length ? product.images[0] : 'assets/placeholder.png'"
            [alt]="product.name"
          />
        </td>
        <td class="name-cell">{{ product.name }}</td>
        <td>${{ product.basePrice | number:'1.2-2' }}</td>
        <td>
          <span *ngFor="let attr of product.attributes | keyvalue; let last = last">
            {{ attr.key }}: {{ attr.value }}{{ last ? '' : ', ' }}
          </span>
        </td>
        <td class="actions-cell">
          <button class="action-btn action-btn--view" (click)="viewProduct(product.id)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            class="action-btn action-btn--delete"
            [disabled]="deletingId() === product.id"
            (click)="deleteProduct(product.id)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!products().length" class="empty-state">
    <mat-icon>inventory_2</mat-icon>
    <p>No products found.</p>
  </div>
</div>
